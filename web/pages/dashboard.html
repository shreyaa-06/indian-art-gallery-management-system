<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — ShilpSangraha</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div class="app-layout">
    <div id="app-sidebar"></div>
    <div class="main-content">
      <div id="app-navbar"></div>
      <main class="page-content">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            </div>
            <div class="stat-label">Treasures on Display</div>
            <div class="stat-value" id="stat-artworks">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            </div>
            <div class="stat-label">Featured Artists</div>
            <div class="stat-value" id="stat-artists">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>
            </div>
            <div class="stat-label">Live Exhibitions</div>
            <div class="stat-value" id="stat-exhibitions">—</div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><h3>Curatorial Activity</h3></div>
          <div class="card-body">
            <div class="activity-list" id="activity-list">
              <div class="loading"><div class="spinner"></div></div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/components/toast.js"></script>
  <script src="/js/components/sidebar.js"></script>
  <script src="/js/components/navbar.js"></script>
  <script src="/js/pages/dashboard.js"></script>
</body>
</html>
