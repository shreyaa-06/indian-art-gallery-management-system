<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ShilpSangraha</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/login.css">
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-brand">
        <h1>ShilpSangraha</h1>
        <p>Indian Heritage Art Gallery</p>
      </div>
      <div class="login-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to curate the collection</p>
        <div id="login-error" class="login-error" role="alert"></div>
        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="username">Username</label>
            <input class="form-control" type="text" id="username" name="username" autocomplete="username" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input class="form-control" type="password" id="password" name="password" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
      </div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/pages/login.js"></script>
</body>
</html>
