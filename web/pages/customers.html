<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers — ShilpSangraha</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div class="app-layout">
    <div id="app-sidebar"></div>
    <div class="main-content">
      <div id="app-navbar"></div>
      <main class="page-content">
        <div class="toolbar">
          <div class="toolbar-left">
            <div class="search-box">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="search" id="search-input" placeholder="Search customers..." aria-label="Search customers">
            </div>
          </div>
          <button class="btn btn-primary" id="add-btn">+ Add Customer</button>
        </div>
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Visit Date</th>
                <th>Notes</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="customers-table">
              <tr><td colspan="6"><div class="loading"><div class="spinner"></div></div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </main>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/components/toast.js"></script>
  <script src="/js/components/modal.js"></script>
  <script src="/js/components/pagination.js"></script>
  <script src="/js/components/sidebar.js"></script>
  <script src="/js/components/navbar.js"></script>
  <script src="/js/pages/customers.js"></script>
</body>
</html>
