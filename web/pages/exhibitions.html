<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exhibitions — ShilpSangraha</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div class="app-layout">
    <div id="app-sidebar"></div>
    <div class="main-content">
      <div id="app-navbar"></div>
      <main class="page-content">
        <div class="toolbar">
          <div class="toolbar-left">
            <select class="filter-select" id="status-filter" aria-label="Filter by status">
              <option value="">All Statuses</option>
            </select>
          </div>
          <button class="btn btn-primary" id="add-btn">+ Create Exhibition</button>
        </div>
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Title</th>
                <th>Location</th>
                <th>Schedule</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="exhibitions-table">
              <tr><td colspan="5"><div class="loading"><div class="spinner"></div></div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </main>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/components/toast.js"></script>
  <script src="/js/components/modal.js"></script>
  <script src="/js/components/pagination.js"></script>
  <script src="/js/components/sidebar.js"></script>
  <script src="/js/components/navbar.js"></script>
  <script src="/js/pages/exhibitions.js"></script>
</body>
</html>
