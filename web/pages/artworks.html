<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artworks — ShilpSangraha</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div class="app-layout">
    <div id="app-sidebar"></div>
    <div class="main-content">
      <div id="app-navbar"></div>
      <main class="page-content">
        <div class="toolbar">
          <div class="toolbar-left">
            <div class="search-box">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="search" id="search-input" placeholder="Search artworks..." aria-label="Search artworks">
            </div>
            <select class="filter-select" id="category-filter" aria-label="Filter by category">
              <option value="">All Categories</option>
            </select>
          </div>
          <button class="btn btn-primary" id="add-btn">+ Add Artwork</button>
        </div>
        <div class="artwork-grid" id="artwork-grid">
          <div class="loading"><div class="spinner"></div></div>
        </div>
        <div class="pagination" id="pagination"></div>
      </main>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/components/toast.js"></script>
  <script src="/js/components/modal.js"></script>
  <script src="/js/components/pagination.js"></script>
  <script src="/js/components/sidebar.js"></script>
  <script src="/js/components/navbar.js"></script>
  <script src="/js/pages/artworks.js"></script>
</body>
</html>
